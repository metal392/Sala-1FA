<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capitão Mayuri</title>
    <style>
        body {
            background-color: #170000;
            margin: 0;
            font-family: Arial, sans-serif;
            color: #eee;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 32px;
        }

        h1 {
            color: #892A71;
            font-size: 96px;
            font-family: Instrument serif, serif;
            margin: 0 0 24px;
        }

        .kurotsuchi p {
            line-height: 1;
            font-size: 50px;
            max-width: 760px;
            font-family: instrument serif;
        }

        .mayuri {
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .mayuri img {
            max-width: 100%;
            width: 360px;
            border-radius: 35px;
            position: fixed;
            top: 150px;
            left: 1100px;
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="kurotsuchi">
            <h1>Mayuri Kurotsuchi</h1>
            <p>Mayuri Kurotsuchi o Capitão da Divisão 12 do Gotei 13 e segundo presidente do Instituto de Desenvolvimento e Pesquisa Shinigami. Sua tenente é Nemu Kurotsuchi, sua "filha" criada artificialmente.</p>
        </div>

        <div class="mayuri">
            <img src="mayuri (1).png" alt="Mayuri" class="mayuri-image">
        </div>

    </div>

    
</body>
</html>
